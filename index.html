<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetheris v6.0 - Offline Exploit Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0040; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: #eee; font-family: 'JetBrains Mono', monospace; }
        #game-view { position: absolute; inset: 0; z-index: 1; }
        
        /* GUI HUD */
        .hud-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .interactable { pointer-events: auto; }
        
        /* Sidebar Modules */
        #mod-list { position: absolute; top: 10px; right: 10px; text-align: right; }
        .mod-item { font-size: 14px; font-weight: bold; text-shadow: 2px 2px #000; margin-bottom: 2px; }

        /* ClickGUI */
        #click-gui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90vw; max-width: 600px; height: 400px;
            background: rgba(10, 10, 10, 0.95); border: 2px solid var(--accent);
            display: flex; flex-direction: column;
        }
        .gui-nav { background: var(--accent); color: #000; padding: 5px 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .gui-body { display: flex; flex: 1; overflow: hidden; }
        .gui-tabs { width: 120px; border-right: 1px solid #333; background: #111; }
        .tab-btn { width: 100%; padding: 10px; font-size: 12px; text-align: left; cursor: pointer; border-bottom: 1px solid #222; }
        .tab-btn.active { background: #222; color: var(--accent); border-left: 3px solid var(--accent); }
        .gui-main { flex: 1; padding: 15px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Auth Screen */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .auth-card { background: #111; padding: 30px; border: 1px solid #333; width: 320px; }
        .input-box { width: 100%; background: #000; border: 1px solid #444; padding: 10px; color: #fff; margin-bottom: 15px; }
        
        /* Controller */
        .joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; background: rgba(255,255,255,0.05); border-radius: 50%; }
        .action-btns { position: absolute; bottom: 20px; right: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-act { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN (OFFLINE MODE) -->
    <div id="auth-overlay">
        <h1 class="text-4xl font-bold text-red-600 mb-8 italic">AETHERIS v6.0</h1>
        <div class="auth-card">
            <label class="text-xs text-gray-500">NICKNAME (OFFLINE)</label>
            <input id="nick-input" type="text" value="Aetheris_User" class="input-box">
            <label class="text-xs text-gray-500">SERVER IP</label>
            <input id="ip-input" type="text" value="localhost" class="input-box">
            <button onclick="engine.connect()" class="w-full bg-red-600 p-3 font-bold hover:bg-red-700 transition">LOGIN OFFLINE</button>
        </div>
        <p class="mt-4 text-[10px] text-gray-600">BYPASSING AUTHENTICATION PROTOCOLS...</p>
    </div>

    <div id="game-view"></div>

    <div class="hud-layer">
        <div id="mod-list"></div>
        
        <div id="debug" class="p-2 text-[10px] text-gray-500">
            FPS: <span id="fps">60</span> | BPS: <span id="bps">0.0</span> | POS: <span id="coords">0, 0, 0</span>
        </div>

        <div id="click-gui" class="interactable hidden">
            <div class="gui-nav">
                <span>CLICKGUI - V6</span>
                <button onclick="ui.toggleGui()">[X]</button>
            </div>
            <div class="gui-body">
                <div class="gui-tabs">
                    <div class="tab-btn active">COMBAT</div>
                    <div class="tab-btn">MOVEMENT</div>
                    <div class="tab-btn">EXPLOIT</div>
                </div>
                <div class="gui-main" id="module-grid">
                    <!-- Modules Generated by JS -->
                </div>
            </div>
        </div>

        <!-- MOBILE CONTROLS -->
        <div class="joystick-zone interactable" id="joy"></div>
        <div class="action-btns interactable">
            <div class="btn-act" onclick="engine.jump()">JMP</div>
            <div class="btn-act" onclick="ui.toggleGui()">GUI</div>
            <div class="btn-act bg-red-900" onclick="engine.forceOp()">OP</div>
            <div class="btn-act" onclick="engine.attack()">ATK</div>
        </div>
    </div>

    <script>
        /**
         * AETHERIS ENGINE CORE
         * Dirancang untuk simulasi paket data real-time dan bypass anticheat.
         */

        const STATE = {
            modules: [
                { id: 'killaura', name: 'KillAura', cat: 'COMBAT', enabled: false },
                { id: 'velocity', name: 'Velocity', cat: 'COMBAT', enabled: false },
                { id: 'fly', name: 'Fly Bypass', cat: 'MOVEMENT', enabled: false },
                { id: 'speed', name: 'Speed', cat: 'MOVEMENT', enabled: false },
                { id: 'noslow', name: 'NoSlowdown', cat: 'MOVEMENT', enabled: false },
                { id: 'forceop', name: 'ForceOP', cat: 'EXPLOIT', enabled: false },
                { id: 'disabler', name: 'Anticheat Disabler', cat: 'EXPLOIT', enabled: true }
            ],
            player: { pos: new THREE.Vector3(0, 5, 0), vel: new THREE.Vector3(), rot: 0, isOp: false },
            input: { forward: 0, side: 0 }
        };

        const engine = {
            init() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: false });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setClearColor(0x050505);
                document.getElementById('game-view').appendChild(this.renderer.domElement);

                // Lighting & Environment
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
                const grid = new THREE.GridHelper(200, 40, 0x333333, 0x111111);
                this.scene.add(grid);

                // Simple Entity (Target)
                const geo = new THREE.BoxGeometry(1, 2, 1);
                const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
                this.dummy = new THREE.Mesh(geo, mat);
                this.dummy.position.set(5, 1, 5);
                this.scene.add(this.dummy);

                this.animate();
            },

            connect() {
                const nick = document.getElementById('nick-input').value;
                document.getElementById('auth-overlay').innerHTML = `<h2 class="text-red-500 animate-pulse">CONNECTING AS ${nick}...</h2>`;
                setTimeout(() => {
                    document.getElementById('auth-overlay').classList.add('hidden');
                    ui.log(`Logged in as ${nick} (Offline Mode)`);
                    ui.log(`Exploit Disabler: Matrix/Spartan BYPASSED`, "#0f0");
                }, 1500);
            },

            jump() {
                if (STATE.player.pos.y <= 0.1 || STATE.modules.find(m => m.id === 'fly').enabled) {
                    STATE.player.vel.y = 0.3;
                }
            },

            attack() {
                this.dummy.scale.set(1.2, 1.2, 1.2);
                setTimeout(() => this.dummy.scale.set(1,1,1), 100);
                ui.log("Packet sent: UseEntity (Attack)", "#f44");
            },

            forceOp() {
                ui.log("Executing Exploit: ForceOP V6...", "#ff0");
                let progress = 0;
                const iv = setInterval(() => {
                    progress += 20;
                    ui.log(`Bypassing Permission System: ${progress}%`);
                    if(progress >= 100) {
                        clearInterval(iv);
                        STATE.player.isOp = true;
                        ui.log("SUCCESS: Server Operator Granted.", "#0f0");
                        document.body.style.boxShadow = "inset 0 0 50px rgba(255,0,0,0.5)";
                    }
                }, 400);
            },

            animate() {
                requestAnimationFrame(() => this.animate());
                
                const fly = STATE.modules.find(m => m.id === 'fly').enabled;
                const speed = STATE.modules.find(m => m.id === 'speed').enabled;
                const ka = STATE.modules.find(m => m.id === 'killaura').enabled;

                // Movement Logic
                let mSpeed = speed ? 0.6 : 0.2;
                if(fly) {
                    STATE.player.vel.y *= 0.8;
                    if(Math.abs(STATE.player.vel.y) < 0.01) STATE.player.vel.y = 0;
                } else {
                    if(STATE.player.pos.y > 0) STATE.player.vel.y -= 0.015;
                    else { STATE.player.pos.y = 0; STATE.player.vel.y = 0; }
                }

                STATE.player.pos.y += STATE.player.vel.y;
                
                // KillAura Simulation
                if(ka) {
                    const dist = STATE.player.pos.distanceTo(this.dummy.position);
                    if(dist < 6) {
                        this.camera.lookAt(this.dummy.position);
                        if(Date.now() % 10 === 0) this.attack();
                    }
                }

                this.camera.position.copy(STATE.player.pos);
                this.camera.position.y += 1.6;
                
                document.getElementById('coords').innerText = `${STATE.player.pos.x.toFixed(1)}, ${STATE.player.pos.y.toFixed(1)}, ${STATE.player.pos.z.toFixed(1)}`;
                this.renderer.render(this.scene, this.camera);
            }
        };

        const ui = {
            toggleGui() {
                document.getElementById('click-gui').classList.toggle('hidden');
            },
            toggleModule(id) {
                const mod = STATE.modules.find(m => m.id === id);
                mod.enabled = !mod.enabled;
                this.renderModules();
                this.updateHud();
                this.log(`${mod.name} is now ${mod.enabled ? 'ON' : 'OFF'}`, mod.enabled ? '#0f0' : '#f00');
            },
            renderModules() {
                const grid = document.getElementById('module-grid');
                grid.innerHTML = '';
                STATE.modules.forEach(m => {
                    const btn = document.createElement('div');
                    btn.className = `p-3 bg-zinc-900 border ${m.enabled ? 'border-red-600' : 'border-zinc-800'} text-[10px] cursor-pointer`;
                    btn.innerHTML = `<strong>${m.name}</strong><br><span class="text-zinc-600">${m.enabled ? 'ENABLED' : 'DISABLED'}</span>`;
                    btn.onclick = () => this.toggleModule(m.id);
                    grid.appendChild(btn);
                });
            },
            updateHud() {
                const hud = document.getElementById('mod-list');
                hud.innerHTML = '';
                STATE.modules.filter(m => m.enabled).forEach(m => {
                    const d = document.createElement('div');
                    d.className = 'mod-item';
                    d.style.color = '#ff0040';
                    d.innerText = m.name;
                    hud.appendChild(d);
                });
            },
            log(msg, color="#aaa") {
                console.log(`%c[Aetheris] ${msg}`, `color: ${color}`);
            }
        };

        window.onload = () => {
            engine.init();
            ui.renderModules();
            ui.updateHud();
        };

        // Resize Handle
        window.onresize = () => {
            engine.camera.aspect = window.innerWidth / window.innerHeight;
            engine.camera.updateProjectionMatrix();
            engine.renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
